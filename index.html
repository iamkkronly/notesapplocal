<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FullView Notes · View then Edit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f4f9fe 0%, #eef2f5 100%);
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
      position: relative;
    }

    /* header */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1f3b4c, #2c5a74);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    h1::before {
      content: "📘";
      font-size: 2rem;
      background: none;
      color: #2c5a74;
    }

    .stats {
      background: rgba(255, 255, 245, 0.8);
      backdrop-filter: blur(4px);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1f4a6e;
    }

    /* notes grid */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin: 1.5rem 0 2rem;
    }

    .note-card {
      background: white;
      border-radius: 28px;
      padding: 1.2rem 1.4rem;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.05);
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid rgba(0, 0, 0, 0.02);
    }

    .note-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 28px -12px rgba(0, 32, 64, 0.15);
      border-color: #e6edf4;
    }

    .note-title-preview {
      font-weight: 700;
      font-size: 1.3rem;
      color: #0f2b3b;
      margin-bottom: 0.5rem;
      word-break: break-word;
    }

    .note-title-preview:empty::before,
    .note-title-preview:empty {
      content: "📄 Untitled";
      font-weight: 500;
      color: #8aa0b0;
    }

    .note-snippet {
      font-size: 0.9rem;
      color: #334e68;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin: 0.6rem 0 0.9rem;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: #8ba0ae;
      border-top: 1px solid #ecf3f9;
      padding-top: 0.6rem;
    }

    .delete-card-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 40px;
      color: #9aaebf;
      transition: 0.1s;
    }

    .delete-card-icon:hover {
      background: #ffe6e5;
      color: #dc2626;
    }

    .empty-grid {
      text-align: center;
      padding: 3.5rem 1rem;
      background: #fffef7;
      border-radius: 48px;
      color: #7f8e9e;
      border: 1px dashed #cbdae6;
      grid-column: 1 / -1;
    }

    /* FULL WINDOW EDITOR / VIEW (shared container) */
    .full-window {
      background: white;
      border-radius: 32px;
      padding: 1.8rem;
      margin-top: 1rem;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.2);
      border: 1px solid #eef2fa;
    }

    .window-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .back-btn {
      background: #eef2f7;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: #1f4a6e;
    }

    .back-btn:hover {
      background: #e2e9f2;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
    }

    .delete-window-btn {
      background: #fff0f0;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      color: #b91c1c;
      cursor: pointer;
    }

    .edit-window-btn, .save-window-btn {
      background: #1f4a6e;
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
    }

    .cancel-window-btn {
      background: #e9eef3;
      color: #2c3e50;
    }

    /* view mode (read only) */
    .view-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #0f2b3b;
      word-break: break-word;
      border-bottom: 2px solid #eef2f8;
      padding-bottom: 0.5rem;
    }

    .view-content {
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      background: #fefef9;
      padding: 1rem;
      border-radius: 24px;
      min-height: 280px;
    }

    /* edit mode (inputs) */
    .editor-title {
      width: 100%;
      font-size: 1.8rem;
      font-weight: 700;
      padding: 0.6rem 0;
      border: none;
      border-bottom: 2px solid #e2e8f0;
      margin-bottom: 1.2rem;
      outline: none;
      font-family: inherit;
      background: transparent;
    }

    .editor-title:focus {
      border-bottom-color: #3b82f6;
    }

    .editor-content {
      width: 100%;
      font-size: 1rem;
      line-height: 1.6;
      padding: 0.8rem;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      outline: none;
      resize: vertical;
      font-family: inherit;
      min-height: 280px;
    }

    .editor-content:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
    }

    .small-note {
      display: block;
      margin-top: 1rem;
      text-align: right;
      color: #8ba0ae;
      font-size: 0.7rem;
    }

    .hidden {
      display: none;
    }

    /* floating add button */
    .floating-add {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1f4a6e;
      width: 60px;
      height: 60px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      border: none;
      z-index: 20;
      color: white;
      font-size: 2rem;
      transition: 0.15s;
    }

    .floating-add:hover {
      background: #0f3552;
      transform: scale(1.02);
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.7rem;
      color: #809aab;
    }

    @media (max-width: 600px) {
      .app {
        padding: 1rem;
      }
      .view-title, .editor-title {
        font-size: 1.4rem;
      }
      .floating-add {
        width: 52px;
        height: 52px;
        font-size: 1.8rem;
        bottom: 1.2rem;
        right: 1.2rem;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header-bar">
    <h1>fullview notes</h1>
    <div class="stats" id="notesCount">0 notes</div>
  </div>

  <!-- NOTES LIST SECTION -->
  <div id="listViewContainer">
    <div id="notesGrid" class="notes-grid"></div>
  </div>

  <!-- FULL WINDOW (shared container: view mode + edit mode) -->
  <div id="fullWindow" class="full-window hidden">
    <div class="window-header">
      <button class="back-btn" id="backToListBtn">← Back to notes</button>
      <div class="action-buttons" id="windowActionButtons">
        <!-- dynamic buttons will be swapped based on mode -->
      </div>
    </div>

    <!-- VIEW MODE (read-only) -->
    <div id="viewModeContainer">
      <div class="view-title" id="viewTitle"></div>
      <div class="view-content" id="viewContent"></div>
      <div class="small-note">✨ Click "Edit" to make changes</div>
    </div>

    <!-- EDIT MODE (inputs) -->
    <div id="editModeContainer" class="hidden">
      <input type="text" id="editorTitle" class="editor-title" placeholder="Note title (optional)" autocomplete="off">
      <textarea id="editorBody" class="editor-content" placeholder="Write your note here..."></textarea>
      <div class="small-note">✏️ Make changes then click Save</div>
    </div>
  </div>

  <footer>⚡ Click any note → opens in view mode → click "Edit" to modify · + button creates new note (direct edit)</footer>
</div>

<button class="floating-add" id="floatingAddBtn" aria-label="Add new note">+</button>

<script>
  (function() {
    // ---------- DATA ----------
    let notesArray = [];        // each: { id, title, content, updatedAt }
    let currentNoteId = null;   // null = add mode, else editing existing note id
    let isEditMode = false;     // whether we are in edit mode inside full window

    // DOM elements
    const notesGridContainer = document.getElementById('notesGrid');
    const listViewDiv = document.getElementById('listViewContainer');
    const fullWindowDiv = document.getElementById('fullWindow');
    const backToListBtn = document.getElementById('backToListBtn');
    const floatingAddBtn = document.getElementById('floatingAddBtn');
    const notesCountSpan = document.getElementById('notesCount');

    // view mode elements
    const viewModeContainer = document.getElementById('viewModeContainer');
    const viewTitleSpan = document.getElementById('viewTitle');
    const viewContentDiv = document.getElementById('viewContent');

    // edit mode elements
    const editModeContainer = document.getElementById('editModeContainer');
    const editorTitle = document.getElementById('editorTitle');
    const editorBody = document.getElementById('editorBody');

    // dynamic button container
    const actionButtonsDiv = document.getElementById('windowActionButtons');

    const STORAGE_KEY = 'fullview_notes_app_v2';

    // helpers: sync localStorage & update counter
    function persistNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notesArray));
    }

    function loadInitialNotes() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed)) {
            notesArray = parsed.map(n => ({
              ...n,
              updatedAt: n.updatedAt || Date.now()
            }));
            return;
          }
        } catch(e) { console.warn(e); }
      }
      // demo seed notes
      notesArray = [
        {
          id: Date.now() + 101,
          title: "🌿 Welcome to FullView Notes",
          content: "This note opens in view mode first. Click the 'Edit' button to modify content.\n\n➕ Use the + button to create fresh notes.\n🗑️ Delete from inside the window or using bin icon on card.",
          updatedAt: Date.now() - 3600000
        },
        {
          id: Date.now() + 102,
          title: "View → Edit flow",
          content: "Tap any note → it shows read-only view. Then tap 'Edit' to enable editing. Works like a real notes app.",
          updatedAt: Date.now() - 1800000
        }
      ];
      persistNotes();
    }

    // render notes grid (list view)
    function renderNotesList() {
      if (!notesGridContainer) return;
      const sorted = [...notesArray].sort((a,b) => b.updatedAt - a.updatedAt);
      const total = sorted.length;
      notesCountSpan.innerText = `${total} ${total === 1 ? 'note' : 'notes'}`;

      if (total === 0) {
        notesGridContainer.innerHTML = `<div class="empty-grid">📭 No notes yet — tap the + button to write your first note</div>`;
        return;
      }

      const fragment = document.createDocumentFragment();
      for (const note of sorted) {
        const card = document.createElement('div');
        card.className = 'note-card';
        card.setAttribute('data-id', note.id);

        const titleDiv = document.createElement('div');
        titleDiv.className = 'note-title-preview';
        const displayTitle = (note.title && note.title.trim() !== "") ? note.title.trim() : "📄 Untitled";
        titleDiv.textContent = displayTitle;

        const snippetDiv = document.createElement('div');
        snippetDiv.className = 'note-snippet';
        let rawContent = note.content ? note.content.trim() : "";
        if (rawContent === "") rawContent = "(empty note)";
        snippetDiv.textContent = rawContent.length > 110 ? rawContent.slice(0, 107) + "..." : rawContent;

        const metaDiv = document.createElement('div');
        metaDiv.className = 'card-meta';
        const date = new Date(note.updatedAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        const timeSpan = document.createElement('span');
        timeSpan.textContent = `🕒 ${date}`;
        const delIcon = document.createElement('button');
        delIcon.innerHTML = '🗑️';
        delIcon.className = 'delete-card-icon';
        delIcon.setAttribute('aria-label', 'delete note');
        delIcon.addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('Delete this note permanently?')) {
            deleteNoteById(note.id);
          }
        });
        metaDiv.appendChild(timeSpan);
        metaDiv.appendChild(delIcon);

        card.appendChild(titleDiv);
        card.appendChild(snippetDiv);
        card.appendChild(metaDiv);

        card.addEventListener('click', (e) => {
          if (e.target === delIcon || delIcon.contains(e.target)) return;
          openFullWindowForNote(note.id);
        });

        fragment.appendChild(card);
      }
      notesGridContainer.innerHTML = '';
      notesGridContainer.appendChild(fragment);
    }

    function deleteNoteById(id) {
      const existed = notesArray.some(n => n.id === id);
      if (!existed) return;
      notesArray = notesArray.filter(n => n.id !== id);
      persistNotes();
      // if the currently open note is deleted, close window
      if (currentNoteId === id) {
        closeFullWindowAndShowList();
      }
      renderNotesList();
    }

    // open full window in VIEW MODE for existing note
    function openFullWindowForNote(noteId) {
      const note = notesArray.find(n => n.id === noteId);
      if (!note) return;
      currentNoteId = note.id;
      isEditMode = false;
      // populate view mode with note data
      viewTitleSpan.textContent = (note.title && note.title.trim() !== "") ? note.title : "📄 Untitled";
      viewContentDiv.textContent = note.content || "(empty note)";
      // clear edit fields (to avoid stale data)
      editorTitle.value = note.title || "";
      editorBody.value = note.content || "";
      
      // show view container, hide edit container
      viewModeContainer.classList.remove('hidden');
      editModeContainer.classList.add('hidden');
      
      // set action buttons for VIEW mode
      updateActionButtonsForView();
      
      // show full window, hide list
      listViewDiv.classList.add('hidden');
      fullWindowDiv.classList.remove('hidden');
    }

    // open full window in EDIT MODE for new note (plus button)
    function openNewNoteEditor() {
      currentNoteId = null;
      isEditMode = true;
      // clear fields
      editorTitle.value = "";
      editorBody.value = "";
      viewTitleSpan.textContent = "";
      viewContentDiv.textContent = "";
      
      // show edit container, hide view container
      viewModeContainer.classList.add('hidden');
      editModeContainer.classList.remove('hidden');
      
      // set action buttons for EDIT mode (new note)
      updateActionButtonsForEdit(true); // isNew = true
      
      listViewDiv.classList.add('hidden');
      fullWindowDiv.classList.remove('hidden');
      
      // focus on content
      editorBody.focus();
    }

    // switch from view mode to edit mode (for existing note)
    function switchToEditMode() {
      if (currentNoteId === null) return; // safety
      const note = notesArray.find(n => n.id === currentNoteId);
      if (!note) return;
      
      isEditMode = true;
      // load current note data into edit fields
      editorTitle.value = note.title || "";
      editorBody.value = note.content || "";
      
      // swap containers
      viewModeContainer.classList.add('hidden');
      editModeContainer.classList.remove('hidden');
      
      // update buttons to edit mode
      updateActionButtonsForEdit(false);
      
      editorBody.focus();
    }

    // save from edit mode (for both new and existing)
    function saveFromEditMode() {
      const newTitle = editorTitle.value.trim();
      const newContent = editorBody.value.trim();
      if (newContent === "") {
        alert("Note content cannot be empty.");
        return;
      }
      
      if (currentNoteId === null) {
        // creating new note
        const newNote = {
          id: Date.now() + Math.random() * 10000,
          title: newTitle === "" ? "" : newTitle,
          content: newContent,
          updatedAt: Date.now()
        };
        notesArray.push(newNote);
        persistNotes();
        renderNotesList();
        closeFullWindowAndShowList();
      } else {
        // updating existing note
        const idx = notesArray.findIndex(n => n.id === currentNoteId);
        if (idx !== -1) {
          notesArray[idx].title = newTitle === "" ? "" : newTitle;
          notesArray[idx].content = newContent;
          notesArray[idx].updatedAt = Date.now();
          persistNotes();
          renderNotesList();
          // after save, we can close or show view mode? Better close to list
          closeFullWindowAndShowList();
        } else {
          // note disappeared
          closeFullWindowAndShowList();
          renderNotesList();
        }
      }
    }

    // cancel edit (go back to view mode if existing note, or close if new)
    function cancelEdit() {
      if (currentNoteId === null) {
        // new note -> close window without saving
        if (confirm("Discard this new note? Changes will be lost.")) {
          closeFullWindowAndShowList();
        }
      } else {
        // existing note: go back to view mode without saving
        const note = notesArray.find(n => n.id === currentNoteId);
        if (note) {
          // reload view fields from stored note
          viewTitleSpan.textContent = (note.title && note.title.trim() !== "") ? note.title : "📄 Untitled";
          viewContentDiv.textContent = note.content || "(empty note)";
          // reset edit fields to match note
          editorTitle.value = note.title || "";
          editorBody.value = note.content || "";
        }
        isEditMode = false;
        viewModeContainer.classList.remove('hidden');
        editModeContainer.classList.add('hidden');
        updateActionButtonsForView();
      }
    }

    // delete current opened note (works from both view and edit modes)
    function deleteCurrentNote() {
      if (currentNoteId !== null) {
        if (confirm("Delete this note permanently?")) {
          deleteNoteById(currentNoteId);
          // deleteNoteById already calls closeFullWindowAndShowList if currentNoteId matches
        }
      } else {
        // no note (new note) -> just close without saving
        if (confirm("Discard this new note?")) {
          closeFullWindowAndShowList();
        }
      }
    }

    // close full window and go back to list
    function closeFullWindowAndShowList() {
      listViewDiv.classList.remove('hidden');
      fullWindowDiv.classList.add('hidden');
      currentNoteId = null;
      isEditMode = false;
    }

    // dynamically set buttons in header based on mode
    function updateActionButtonsForView() {
      actionButtonsDiv.innerHTML = `
        <button class="edit-window-btn" id="editModeBtn">✏️ Edit</button>
        <button class="delete-window-btn" id="deleteWindowBtn">🗑️ Delete</button>
      `;
      document.getElementById('editModeBtn')?.addEventListener('click', switchToEditMode);
      document.getElementById('deleteWindowBtn')?.addEventListener('click', deleteCurrentNote);
    }

    function updateActionButtonsForEdit(isNew = false) {
      if (isNew) {
        actionButtonsDiv.innerHTML = `
          <button class="save-window-btn" id="saveEditBtn">✔ Save</button>
          <button class="cancel-window-btn" id="cancelEditBtn">Cancel</button>
        `;
      } else {
        actionButtonsDiv.innerHTML = `
          <button class="save-window-btn" id="saveEditBtn">✔ Save</button>
          <button class="cancel-window-btn" id="cancelEditBtn">Cancel</button>
          <button class="delete-window-btn" id="deleteWindowBtn">🗑️ Delete</button>
        `;
        document.getElementById('deleteWindowBtn')?.addEventListener('click', deleteCurrentNote);
      }
      document.getElementById('saveEditBtn')?.addEventListener('click', saveFromEditMode);
      document.getElementById('cancelEditBtn')?.addEventListener('click', cancelEdit);
    }

    // ----- event bindings -----
    floatingAddBtn.addEventListener('click', openNewNoteEditor);
    backToListBtn.addEventListener('click', closeFullWindowAndShowList);

    // Ctrl+S shortcut in edit mode
    editorBody.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (!editModeContainer.classList.contains('hidden')) {
          saveFromEditMode();
        }
      }
    });
    editorTitle.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (!editModeContainer.classList.contains('hidden')) {
          saveFromEditMode();
        }
      }
    });

    // initial load
    loadInitialNotes();
    renderNotesList();

    // ensure full window is hidden on start
    fullWindowDiv.classList.add('hidden');
    listViewDiv.classList.remove('hidden');
  })();
</script>
</body>
</html>
